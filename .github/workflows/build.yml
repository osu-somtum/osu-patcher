name: Build & Test

on:
  push:
    branches-ignore: [ "release" ]
    paths-ignore: [ "**.md" ]
  pull_request:
    paths-ignore: [ "**.md" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 15
    # Only run if this isn't a PR or this is a PR not from our repo
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x.x

      - name: Setup .NET Framework
        uses: microsoft/setup-msbuild@v2

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: i686-pc-windows-msvc

      # Produces the single self-contained win-x86 exe with the hook payload embedded.
      # The hook (net452) and the native rosu.dll (i686) build via the ProjectReference
      # chain before the injector embeds them.
      - name: Publish injector
        run: dotnet publish Osu.Patcher.Injector -c Release

      - name: Upload Injector artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu!patcher
          if-no-files-found: error
          path: .\Osu.Patcher.Injector\bin\Release\net8.0-windows\win-x86\publish\osu!.patcher.exe

      # Run in Release to match the publish step above: Osu.Utils/Osu.Stubs (net452)
      # are already built in Release, so this won't recompile — and won't hit a
      # file lock from the build server holding the freshly-built utils.dll.
      - name: Run stub tests
        run: dotnet run -c Release --project Osu.Stubs.Tests